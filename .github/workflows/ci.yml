name: Tempoch JS CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tempoch-node/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tempoch-node -> tempoch-node/target
      - run: ./scripts/ci.sh install
      - run: ./scripts/ci.sh format

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tempoch-node/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tempoch-node -> tempoch-node/target
      - run: ./scripts/ci.sh install
      - run: ./scripts/ci.sh lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tempoch-node/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tempoch-node -> tempoch-node/target
      - run: ./scripts/ci.sh install
      - run: BUILD_MODE=release ./scripts/ci.sh build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tempoch-node/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tempoch-node -> tempoch-node/target
      - run: ./scripts/ci.sh install
      - run: ./scripts/ci.sh build
      - run: ./scripts/ci.sh test

  coverage:
    name: Test & Coverage
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: tempoch-node/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tempoch-node -> tempoch-node/target
      - run: ./scripts/ci.sh install
      - run: ./scripts/ci.sh build
      - run: ./scripts/ci.sh coverage
      - name: Document coverage scope
        run: |
          {
            echo "JavaScript coverage is informational only in this repository."
            echo
            echo "The exercised runtime surface is an autogenerated N-API loader; the package logic lives in native Rust."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tempoch-js-coverage
          path: tempoch-node/coverage
          retention-days: 7
